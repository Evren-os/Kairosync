"$schema" = "https://starship.rs/config-schema.json"

# Keep the prompt tight in split panes: one context line, one input line.
format = """
$container$nix_shell$username$hostname$directory$git_branch$git_state$git_status$git_metrics
$status$cmd_duration$jobs$sudo$python$nodejs$bun$rust$golang$c$cpp$battery$character"""
right_format = ""
add_newline = false
scan_timeout = 20
command_timeout = 350
follow_symlinks = true
palette = "autoland"

[palettes.autoland]
fg = "#d8dee9"
muted = "#6f7b8a"
path = "#8fb4ff"
repo = "#c7d7ff"
git = "#7dc4e4"
ok = "#8fbc8f"
warn = "#e5b567"
bad = "#e67e80"
info = "#9ccfd8"

[container]
format = '[$symbol $name]($style) '
symbol = "ctr"
style = "fg:warn"
disabled = false

[nix_shell]
# Text badges survive font/theme changes better than decorative icon blocks.
format = '[$symbol $state( $name)]($style) '
symbol = "nix"
style = "fg:warn"
impure_msg = "impure"
pure_msg = "pure"
unknown_msg = "shell"
heuristic = false
disabled = false

[username]
detect_env_vars = []
format = '[$user]($style)'
style_user = "fg:info"
style_root = "bold fg:bad"
show_always = false
disabled = false

[hostname]
ssh_only = true
ssh_symbol = ""
trim_at = "."
detect_env_vars = []
format = '[@$hostname]($style) '
style = "fg:info"
disabled = false

[directory]
truncate_to_repo = true
truncation_length = 2
truncation_symbol = "…/"
home_symbol = "~"
read_only = " "
read_only_style = "fg:warn"
use_logical_path = true
use_os_path_sep = true
fish_style_pwd_dir_length = 0
format = '[$path]($style)[$read_only]($read_only_style) '
repo_root_format = '[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) '
style = "fg:path"
repo_root_style = "bold fg:repo"
disabled = false

[git_branch]
format = '[$symbol$branch]($style) '
symbol = " "
style = "fg:git"
truncation_length = 18
truncation_symbol = "…"
only_attached = true
always_show_remote = false
ignore_branches = []
ignore_bare_repo = false
disabled = false

[git_state]
format = '[$state( $progress_current/$progress_total)]($style) '
rebase = "rebase"
merge = "merge"
revert = "revert"
cherry_pick = "pick"
bisect = "bisect"
am = "am"
am_or_rebase = "am/rebase"
style = "fg:warn"
disabled = false

[git_status]
# Dense git markers are easier to scan than Jetpack's framed powerline block.
format = '([ $ahead_behind$staged$modified$untracked$renamed$deleted$conflicted$typechanged$stashed]($style)) '
style = "fg:muted"
stashed = "* "
ahead = "⇡${count} "
behind = "⇣${count} "
up_to_date = ""
diverged = "⇕${ahead_count}/${behind_count} "
conflicted = "= "
deleted = "✘ "
renamed = "» "
modified = "! "
staged = "+${count} "
untracked = "? "
typechanged = "~ "
ignore_submodules = true
use_git_executable = false
disabled = false

[git_metrics]
only_nonzero_diffs = true
ignore_submodules = true
format = '([+$added]($added_style) )([-$deleted]($deleted_style) )'
added_style = "fg:ok"
deleted_style = "fg:bad"
disabled = false

[python]
format = '[py$version]($style) '
version_format = "${raw}"
style = "fg:ok"
disabled = false
detect_extensions = ["py", "ipynb"]
detect_files = [
  "requirements.txt",
  ".python-version",
  "pyproject.toml",
  "Pipfile",
  "tox.ini",
  "setup.py",
  "__init__.py",
]
detect_folders = []
detect_env_vars = ["VIRTUAL_ENV"]

[nodejs]
format = '[node$version]($style) '
version_format = "${raw}"
style = "fg:ok"
disabled = false
not_capable_style = "fg:bad"
detect_extensions = ["js", "mjs", "cjs", "ts", "mts", "cts"]
detect_files = [
  "package.json",
  ".node-version",
  ".nvmrc",
  "!bunfig.toml",
  "!bun.lock",
  "!bun.lockb",
]
detect_folders = ["node_modules"]

[bun]
format = '[bun$version]($style) '
version_format = "${raw}"
symbol = "bun "
style = "fg:ok"
disabled = false
detect_extensions = []
detect_files = ["bun.lock", "bun.lockb", "bunfig.toml"]
detect_folders = []

[rust]
format = '[rs$version]($style) '
version_format = "${raw}"
symbol = "rs "
style = "fg:ok"
disabled = false
detect_extensions = ["rs"]
detect_files = ["Cargo.toml"]
detect_folders = []

[golang]
format = '[go]($style) '
version_format = "${raw}"
symbol = "go "
style = "fg:ok"
not_capable_style = "fg:bad"
detect_extensions = ["go"]
detect_files = [
  "go.mod",
  "go.sum",
  "go.work",
  "glide.yaml",
  "Gopkg.yml",
  "Gopkg.lock",
  ".go-version",
]
detect_folders = ["Godeps"]
disabled = false

[c]
format = '[c$version]($style) '
version_format = "${raw}"
symbol = "c "
style = "fg:ok"
disabled = false
detect_extensions = ["c", "h"]
detect_files = []
detect_folders = []
commands = [["cc", "--version"], ["gcc", "--version"], ["clang", "--version"]]

[cpp]
format = '[c++$version]($style) '
version_format = "${raw}"
symbol = "c++ "
style = "fg:ok"
disabled = false
detect_extensions = [
  "cpp",
  "cc",
  "cxx",
  "c++",
  "hpp",
  "hh",
  "hxx",
  "h++",
  "tcc",
]
detect_files = []
detect_folders = []
commands = [
  [
    "c++",
    "--version",
  ],
  [
    "g++",
    "--version",
  ],
  [
    "clang++",
    "--version",
  ],
]

[status]
# Show numeric failures, but stay silent on success.
format = '[$symbol$status]($style) '
symbol = "✘"
success_symbol = ""
not_executable_symbol = "! "
not_found_symbol = "? "
sigint_symbol = "^C "
signal_symbol = "sig "
style = "fg:bad"
map_symbol = false
recognize_signal_code = true
pipestatus = false
pipestatus_separator = "|"
pipestatus_format = '\[$pipestatus\] => [$symbol$common_meaning$signal_name$maybe_int]($style) '
disabled = false

[cmd_duration]
min_time = 1200
show_milliseconds = false
show_notifications = false
min_time_to_notify = 45000
format = '[$duration]($style) '
style = "fg:muted"
disabled = false

[jobs]
threshold = 1
symbol_threshold = 1
number_threshold = 1
format = '[$symbol$number]($style) '
symbol = "&"
style = "fg:info"
disabled = false

[sudo]
format = '[$symbol]($style) '
symbol = "sudo"
style = "fg:warn"
allow_windows = false
disabled = false

[battery]
format = '[$symbol$percentage]($style) '
full_symbol = "󰁹 "
charging_symbol = "󰂄 "
discharging_symbol = "󰂃 "
unknown_symbol = "󰁽 "
empty_symbol = "󰂎 "
disabled = false

[[battery.display]]
threshold = 12
style = "fg:bad"

[[battery.display]]
threshold = 25
style = "fg:warn"

[character]
format = "$symbol "
success_symbol = "[❯](fg:info)"
error_symbol = "[❯](fg:bad)"
vimcmd_symbol = "[❮](fg:warn)"
vimcmd_visual_symbol = "[❮](fg:warn)"
vimcmd_replace_symbol = "[❮](fg:warn)"
vimcmd_replace_one_symbol = "[❮](fg:warn)"
disabled = false
